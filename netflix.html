    <style>
        body {
            background-color: #141414;
            color: #FFFFFF;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .navbar {
            display: flex;
            align-items: center;
            margin-bottom: 30px;

        }

        .logo {
            color: #E50914;
            font-size: 30px;
            font-weight: bold;
            text-decoration: uppercase;
            margin-right: 30px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #E5E5E5;

        }

        .category-row {
            margin-bottom: 40px;
        }

        .raw-title {
            font-size: 20px;
            font-weight: bold;
            color: #E5E5E5;
            margin-bottom: 15px;
        }

        .movie-slider {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .movie-card {
            flex: 0 0 auto;
            width: 210px;
            height: 118px;
            background-color: #333;
            border-radius: 4px;
            overflow:hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .movie-card:hover{
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
